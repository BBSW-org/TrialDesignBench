name: Ruff check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev --python 3.14 --no-python-downloads \
            --no-install-package openai-codex \
            --no-install-package openai-codex-cli-bin
      - name: Run Ruff
        run: uv run --no-sync ruff check --output-format=github .
