name: CI tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev --python ${{ matrix.python-version }} --no-python-downloads \
            --no-install-package openai-codex \
            --no-install-package openai-codex-cli-bin
      - name: Test with pytest
        env:
          TDB_SKIP_CODEX_RUNTIME_TESTS: "1"
        run: |
          uv run --no-sync pytest

      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     name: "py${{ matrix.python-version }}"
      #     token: ${{ secrets.CODECOV_TOKEN }}

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install uv
          uv sync --dev --python 3.14 --no-python-downloads
      - name: Test with pytest
        run: |
          uv run --no-sync pytest
